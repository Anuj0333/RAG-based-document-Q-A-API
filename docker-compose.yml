version: "3.9"

services:

  fastapi:
    build: .
    container_name: rag_fastapi
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - rag_network

  streamlit:
    build: .
    container_name: rag_streamlit
    command: python -m streamlit run UI/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8502:8501"
    depends_on:
      - fastapi
    networks:
      - rag_network

  qdrant:
    image: qdrant/qdrant
    container_name: rag_qdrant
    ports:
      - "6333:6333"
    networks:
      - rag_network

  ollama:
    image: ollama/ollama
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag_network

networks:
  rag_network:

volumes:
  ollama_data: